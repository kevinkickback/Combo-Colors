name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Verify artifact versions match tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          MANIFEST_VERSION=$(node -p "require('./manifest.json').version")

          echo "Tag:      $TAG"
          echo "package:  $PKG_VERSION"
          echo "manifest: $MANIFEST_VERSION"

          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "ERROR: package.json version ($PKG_VERSION) does not match tag ($TAG)"
            exit 1
          fi

          if [ "$MANIFEST_VERSION" != "$TAG" ]; then
            echo "ERROR: manifest.json version ($MANIFEST_VERSION) does not match tag ($TAG)"
            exit 1
          fi

      - name: Package manual install zip
        run: |
          TAG="${GITHUB_REF_NAME}"
          STAGE_DIR="combo-colors"
          ZIP_NAME="combo-colors-${TAG}.zip"

          rm -rf "$STAGE_DIR"
          mkdir -p "$STAGE_DIR"
          cp main.js "$STAGE_DIR/"
          cp manifest.json "$STAGE_DIR/"
          cp styles.css "$STAGE_DIR/"

          zip -r "$ZIP_NAME" "$STAGE_DIR"

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: |
            main.js
            manifest.json
            styles.css
            combo-colors-${{ github.ref_name }}.zip
